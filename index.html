<!DOCTYPE html>
<html lang="en">
<head>

<body>

<!-- ================= LOGIN SCREEN ================= -->
<div id="login-screen" style="
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
background:var(--bg-secondary);z-index:9999;
">

  <div style="
    width:320px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:14px;
    padding:22px;
    text-align:center;
  ">
    <div style="
      width:44px;height:44px;
      margin:0 auto 12px;
      background:var(--accent);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
    ">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <ellipse cx="12" cy="5" rx="3" ry="4"/>
        <path d="M12 9l6 12H6L12 9z"/>
      </svg>
    </div>

    <h2 style="font-size:18px;margin-bottom:4px;">Badminton Login</h2>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;">
      Sign in to sync your players & matches
    </div>

    <input id="email" placeholder="Email"
      style="width:100%;padding:10px;margin-bottom:10px;
      border:1px solid var(--border);border-radius:10px;background:var(--bg);" />

    <input id="password" type="password" placeholder="Password"
      style="width:100%;padding:10px;margin-bottom:14px;
      border:1px solid var(--border);border-radius:10px;background:var(--bg);" />

    <button onclick="login()" class="btn-primary" style="width:100%;margin-bottom:8px;">
      Login
    </button>

    <button onclick="signup()" class="btn-secondary" style="width:100%;">
      Create account
    </button>

    <div id="login-msg" style="font-size:12px;color:#A32D2D;margin-top:10px;"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div class="container" id="app" style="display:none;">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <ellipse cx="12" cy="5" rx="3" ry="4"/>
        <path d="M12 9l6 12H6L12 9z"/>
      </svg>
    </div>
    <div>
      <h1>Badminton Team Generator</h1>
      <div class="sub">Balanced doubles · simultaneous courts · fair rotation</div>
    </div>
  </header>

  <button onclick="logout()" class="btn-secondary" style="margin-bottom:16px;">
    Logout
  </button>

  <!-- ===== YOUR ORIGINAL APP UI BELOW (UNCHANGED) ===== -->

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('players')">Players</button>
    <button class="tab-btn" onclick="switchTab('matches')">Matches</button>
  </div>

  <!-- (PASTE YOUR ORIGINAL HTML EXACTLY HERE — unchanged) -->

  <div id="tab-players">
    <!-- YOUR ORIGINAL PLAYERS UI -->
  </div>

  <div id="tab-matches" style="display:none;">
    <!-- YOUR ORIGINAL MATCH UI -->
  </div>

</div>

<script>
/* ================= SUPABASE CONFIG ================= */
const SUPABASE_URL = "https://fwrtpzrcjfvultdtdcto.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ovPrtJLbrPZ3LjTh929eKw_aKoI6Hvx";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

/* ================= AUTH ================= */

async function checkUser() {
  const { data } = await sb.auth.getUser();
  if (data?.user) {
    currentUser = data.user;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadData();
  }
}

async function login() {
  const email = emailEl().value;
  const password = passEl().value;

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return showMsg(error.message);
  checkUser();
}

async function signup() {
  const email = emailEl().value;
  const password = passEl().value;

  const { error } = await sb.auth.signUp({ email, password });
  if (error) return showMsg(error.message);

  showMsg("Check email to confirm account");
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

function emailEl(){ return document.getElementById("email"); }
function passEl(){ return document.getElementById("password"); }
function showMsg(m){ document.getElementById("login-msg").innerText = m; }

/* ================= DATA LAYER (REPLACES IndexedDB) ================= */

async function loadData() {
  loadPlayers();
  loadMatches();
}

async function loadPlayers() {
  let { data } = await sb
    .from("players")
    .select("*")
    .eq("user_id", currentUser.id);

  players = data || [];
  renderPlayers();
}

async function savePlayer(p) {
  p.user_id = currentUser.id;

  if (!p.id) {
    const { data } = await sb.from("players").insert(p).select().single();
    return data;
  } else {
    await sb.from("players").update(p).eq("id", p.id);
    return p;
  }
}

async function deletePlayer(id) {
  await sb.from("players").delete().eq("id", id);
}

async function loadMatches() {
  let { data } = await sb
    .from("matches")
    .select("*")
    .eq("user_id", currentUser.id)
    .single();

  if (data) {
    savedMatchHTML = data.html;
    savedMatchMeta = data.meta;
  }
}

/* ================= PATCHED FUNCTIONS ================= */

async function addPlayer() {
  var el = document.getElementById('new-name');
  var name = el.value.trim();
  if (!name) return;

  var obj = {
    name,
    skill: parseInt(document.getElementById('new-skill').value),
    absent: false
  };

  obj.user_id = currentUser.id;
  
  const saved = await savePlayer(obj);
  players.push(saved);
  renderPlayers();
  el.value = '';
}

async function removePlayer(id) {
  await deletePlayer(id);
  players = players.filter(p => p.id !== id);
  renderPlayers();
}

/* keep your existing logic unchanged */
checkUser();
</script>

</body>
</html>
